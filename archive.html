<header class="gc-masthead small">
  <div class="gc-masthead-box"><h1 class="gc-masthead-title">Archive</h1></div>
  <p class="gc-masthead-tagline">Every issue, organized by month.</p>
</header>
<div class="gc-squiggle"></div>

<div class="gc-section" id="archiveContainer"></div>

<footer class="gc-footer">&copy; 2026 GET CULTRD &middot; Placeholder text &amp; images throughout.</footer>

<script src="data.js"></script>
<script src="main.js"></script>
<script>
  function renderArchive() {
    const container = document.getElementById("archiveContainer");
    container.innerHTML = MONTHS.map((month, i) => `
      <div class="month-group">
        <button class="month-accordion-btn" onclick="toggleMonth(${i})">
          <span>${month.label}${month.current ? " — Current Issue" : ""}</span>
          <span id="monthArrow${i}">${i === 0 ? "▲" : "▼"}</span>
        </button>
        <div class="month-articles ${i === 0 ? "open" : ""}" id="monthGroup${i}">
          ${getArticlesByMonth(month.key).map(archiveCardHTML).join("")}
        </div>
      </div>
    `).join("");
  }

  function toggleMonth(i) {
    const group = document.getElementById(`monthGroup${i}`);
    const arrow = document.getElementById(`monthArrow${i}`);
    const isOpen = group.classList.toggle("open");
    arrow.textContent = isOpen ? "▲" : "▼";
  }

  renderArchive();
</script>
</body>
